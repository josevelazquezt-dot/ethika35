<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHIKA 35 | Próximamente</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0f172a;
        }

        .container {
            background: #ffffff;
            padding: 50px 60px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 20px 48px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 500px;
            border-top: 5px solid #10b981; /* Acento verde corporativo */
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #1e293b;
            letter-spacing: -1px;
        }

        h2 {
            font-size: 1.2rem;
            font-weight: 300;
            color: #64748b;
            margin-bottom: 30px;
        }

        .divider {
            height: 1px;
            background: #e2e8f0;
            margin: 20px 0;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #475569;
            margin-bottom: 30px;
        }

        .badge {
            display: inline-block;
            background: #eff6ff;
            color: #2563eb;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Konfidente</h1>
        <h2>La Alquimia de la Integridad Corporativa</h2>
        
        <div class="divider"></div>
        
        <p>Estamos preparando la suite definitiva para el cumplimiento automatizado de la <strong>ETICA</strong> y la <strong>Ley Federal del Trabajo</strong> en México.</p>
        
        <div class="badge">Próximamente</div>
    </div>

</body>
</html>
